async function hashPassword(password){
  const data=new TextEncoder().encode(password);
  const hash=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  const cached = lsGet('bin_'+binId, null);
  try {
    const r = await fetch(`${BIN_BASE}/${binId}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }

    lsSet('bin_'+binId, val);
    return val;
  } catch(e) {
    console.warn('binRead fallback:', e.message);
    return cached;
  }
}

      },

// ── Poster ────────────────────────────────────────────
function Poster({src,alt,mini}){
  const[err,setErr]=useState(false);
  if(err||!src){
    if(mini)return<div className="poster-mini-ph">{(alt||'').slice(0,5)}</div>;
    return<div className="poster-ph">{alt||'Постер'}</div>;
  }
  return<div className="poster-wrap"><img src={src} alt={alt||''} onError={()=>setErr(true)}/></div>;
}


// ── Auth Modal ────────────────────────────────────────
function AuthModal({onClose,onAuth,binKey,binUsersId}){
  const[mode,setMode]=useState('start');
  const[email,setEmail]=useState('');
  const[password,setPassword]=useState('');
  const[name,setName]=useState('');
  const[error,setError]=useState('');
  const[loading,setLoading]=useState(false);

  const readUsers=async()=>{
    if(binKey&&binUsersId){
      const data=await binRead(binUsersId);
      return data?.users||{};
    }
    return lsGet('km_users',{});
  };

  const writeUsers=async(users)=>{
    if(binKey&&binUsersId){
      await binWrite(binUsersId,{users});
    } else {
      lsSet('km_users',users);
    }
  };

  const nextFromStart=async()=>{
    setError('');
    if(!email.includes('@')){setError('Введите корректный email');return;}
    setLoading(true);
    const users=await readUsers();
    setLoading(false);
    setMode(users[email]?'login':'register');
  };

  const submit=async()=>{
    setError('');setLoading(true);
    const users=await readUsers();
    if(mode==='login'){
      if(!users[email]){setLoading(false);setError('Пользователь не найден');return;}
      if(users[email].password!==await hashPassword(password)){setLoading(false);setError('Неверный пароль');return;}
      const u={email,name:users[email].name,isAdmin:!!users[email].isAdmin};
      lsSet('km_cur',u);setLoading(false);onAuth(u);
    } else {
      if(!name.trim()){setLoading(false);setError('Введите имя');return;}
      if(password.length<4){setLoading(false);setError('Пароль минимум 4 символа');return;}
      const nu={...users,[email]:{password:await hashPassword(password),name:name.trim(),isAdmin:false}};
      await writeUsers(nu);
      const u={email,name:name.trim(),isAdmin:false};
      lsSet('km_cur',u);setLoading(false);onAuth(u);
    }
  };

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')onClose()}}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>×</button>
        <h2>ВХОД / РЕГИСТРАЦИЯ</h2>
        {error&&<div className="modal-error">{error}</div>}
        {loading&&<div className="modal-info">⏳ Соединение с облаком...</div>}
        <div className="modal-label">ЭЛЕКТРОННАЯ ПОЧТА:</div>
        <input className="modal-input" type="email" placeholder="email@example.com"
          value={email} onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(mode==='start'?nextFromStart():submit())}
          disabled={mode!=='start'||loading}/>
        {mode!=='start'&&<>
          {mode==='register'&&<>
            <div className="modal-label">ИМЯ:</div>
            <input className="modal-input" type="text" placeholder="Ваше имя"
              value={name} onChange={e=>setName(e.target.value)} disabled={loading}/>
          </>}
          <div className="modal-label">ПАРОЛЬ:</div>
          <input className="modal-input" type="password" placeholder="Пароль"
            value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()} disabled={loading}/>
        </>}
        {mode==='start'&&<button className="modal-submit" onClick={nextFromStart} disabled={loading}>
          {loading?'ПРОВЕРКА...':'ПРОДОЛЖИТЬ'}
        </button>}
        {mode!=='start'&&<button className="modal-submit" onClick={submit} disabled={loading}>
          {loading?'ЗАГРУЗКА...':(mode==='login'?'ВОЙТИ':'ЗАРЕГИСТРИРОВАТЬСЯ')}
        </button>}
        {mode==='login'&&<div className="modal-switch">Нет аккаунта? <span onClick={()=>{setMode('register');setError('')}}>Зарегистрироваться</span></div>}
        {mode==='register'&&<div className="modal-switch">Есть аккаунт? <span onClick={()=>{setMode('login');setError('')}}>Войти</span></div>}
        {mode!=='start'&&<div className="modal-switch"><span onClick={()=>{setMode('start');setError('')}}>← Изменить email</span></div>}
      </div>
    </div>
  );
}

// ── Filters ───────────────────────────────────────────
function Filters({filters,onChange,movies}){
  const genres=useMemo(()=>['',...new Set(movies.map(m=>m.genre))].sort(),[movies]);
  const countries=useMemo(()=>['',...new Set(movies.map(m=>m.country))].sort(),[movies]);
  const years=useMemo(()=>['',...new Set(movies.map(m=>String(m.year)))].sort((a,b)=>b-a),[movies]);
  return(
    <div className="filters">
      <h2>ФИЛЬТРЫ</h2>
      {[{k:'year',label:'ГОД',opts:years},{k:'genre',label:'ЖАНР',opts:genres},{k:'country',label:'СТРАНА',opts:countries}].map(({k,label,opts})=>(
        <div className="filter-group" key={k}>
          <label>{label}:</label>
          <select className="filter-select" value={filters[k]} onChange={e=>onChange({...filters,[k]:e.target.value})}>
            {opts.map(o=><option key={o} value={o}>{o||'—'}</option>)}
          </select>
        </div>
      ))}
      {(filters.year||filters.genre||filters.country)&&
        <button className="filter-reset" onClick={()=>onChange({year:'',genre:'',country:''})}>СБРОСИТЬ</button>}
    </div>
  );
}

// ── ListPage ──────────────────────────────────────────
function ListPage({type,movies,onMovie}){
  const[filters,setFilters]=useState({genre:'',year:'',country:''});
  const items=movies.filter(m=>m.type===type);
  const filtered=items.filter(m=>{
    if(filters.genre&&m.genre!==filters.genre)return false;
    if(filters.year&&String(m.year)!==filters.year)return false;
    if(filters.country&&m.country!==filters.country)return false;
    return true;
  });
  return(
    <div className="page">
      <div className="films-layout">
        <Filters filters={filters} onChange={setFilters} movies={items}/>
        <div className="movies-grid">
          {filtered.length===0&&<div className="no-results" style={{gridColumn:'1/-1'}}>Ничего не найдено</div>}
          {filtered.map(m=>(

    </div>
  );
}

// ── AdminPanel ────────────────────────────────────────
const GENRES_LIST=["Боевик","Комедия","Драма","Триллер","Фэнтзи","Фантастика","Хоррор","Мелодрама","Анимация","Документальный"];
const COUNTRIES_LIST=["Россия","США","Корея","Германия","Франция","Великобритания","Япония","Китай","Индия","Италия"];
const EMPTY_FORM={title:'',year:String(new Date().getFullYear()),genre:'Боевик',country:'Россия',type:'movie',seasons:'1',poster:'',desc:''};

function AdminPanel({db,onDBChange,onBack,binKey,binDbId}){
  const[subtab,setSubtab]=useState('list');
  const[form,setForm]=useState(EMPTY_FORM);
  const[editId,setEditId]=useState(null);
  const[success,setSuccess]=useState('');
  const[saving,setSaving]=useState(false);
  const[filterType,setFilterType]=useState('all');
  const[srch,setSrch]=useState('');
  const[syncSt,setSyncSt]=useState('');
  const movies=db.movies;

  const visible=movies.filter(m=>{
    if(filterType!=='all'&&m.type!==filterType)return false;
    if(srch&&!m.title.toLowerCase().includes(srch.toLowerCase()))return false;
    return true;
  });

  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const startEdit=(m)=>{
    setForm({title:m.title,year:String(m.year),genre:m.genre,country:m.country,
      type:m.type,seasons:String(m.seasons||1),poster:m.poster||'',desc:m.desc||''});
    setEditId(m.id);setSubtab('add');setSuccess('');
  };

  const cancelEdit=()=>{setForm(EMPTY_FORM);setEditId(null);setSubtab('list')};

  const persistDB=async(newDB)=>{
    onDBChange(newDB);
    setSaving(true);setSyncSt('syncing');
    let ok=false;
    if(binKey&&binDbId) ok=await binWrite(binDbId,newDB);
    else lsSet('km_db_local',newDB);
    setSaving(false);setSyncSt(ok?'ok':(binKey?'err':'local'));
    return ok;
  };

  const save=async()=>{
    if(!form.title.trim()){alert('Введите название');return;}
    if(form.poster&&!form.poster.startsWith('http')&&!form.poster.startsWith('//')&&!form.poster.startsWith('posters/')){
      if(!confirm('Постер не выглядит как URL. Продолжить?'))return;
    }
    const entry={
      id:editId||(Date.now()),title:form.title.trim(),year:parseInt(form.year)||2025,
      genre:form.genre,country:form.country,type:form.type,poster:form.poster.trim(),desc:form.desc.trim(),
      ...(form.type==='series'?{seasons:parseInt(form.seasons)||1}:{})
    };
    const newMovies=editId?movies.map(m=>m.id===editId?entry:m):[...movies,entry];
    const ok=await persistDB({...db,movies:newMovies});
    setSuccess(editId?`Обновлено ✓ ${ok?'(облако)':'(локально)'}`:`Добавлено ✓ ${ok?'(облако)':'(локально)'}`);
    setForm(EMPTY_FORM);setEditId(null);
    if(!editId)setSubtab('list');
  };

  const remove=async(id)=>{
    if(!confirm('Удалить?'))return;
    await persistDB({...db,movies:movies.filter(m=>m.id!==id)});
  };

  const resetDB=async()=>{
    if(!confirm('Сбросить к начальным данным?'))return;
    await persistDB(getFallbackDB());
  };

  const exportDB=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='db.json';a.click();
  };

  return(
    <div className="admin-page">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h1>АДМИНИСТРАТОР</h1>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {syncSt==='syncing'&&<span className="sync-ing">⏳ синхронизация...</span>}
          {syncSt==='ok'&&<span className="sync-ok">☁ синхронизировано</span>}
          {syncSt==='err'&&<span className="sync-err">⚠ только локально</span>}
          {syncSt==='local'&&<span className="sync-err">💾 только локально</span>}
          <button className="btn-back" onClick={onBack}>← НАЗАД</button>
        </div>
      </div>
      {(!binKey||!binDbId)&&<div className="admin-warn">⚠ JSONBin не настроен — изменения сохраняются только на этом устройстве.</div>}
      <div className="admin-tab-row">
        <div className={`admin-tab${subtab==='list'?' active':''}`} onClick={()=>{setSubtab('list');cancelEdit()}}>СПИСОК ({movies.length})</div>
        <div className={`admin-tab${subtab==='add'?' active':''}`} onClick={()=>{setSubtab('add');if(!editId)setForm(EMPTY_FORM)}}>
          {editId?'РЕДАКТИРОВАТЬ':'ДОБАВИТЬ'}
        </div>
      </div>

      {subtab==='list'&&<>
        <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
          <input className="admin-input" placeholder="Поиск..." value={srch} onChange={e=>setSrch(e.target.value)} style={{flex:1,minWidth:140}}/>
          <select className="admin-select" value={filterType} onChange={e=>setFilterType(e.target.value)} style={{width:150}}>
            <option value="all">Все ({movies.length})</option>
            <option value="movie">Фильмы ({movies.filter(m=>m.type==='movie').length})</option>
            <option value="series">Сериалы ({movies.filter(m=>m.type==='series').length})</option>
          </select>
          <button className="admin-btn secondary" onClick={exportDB}>ЭКСПОРТ</button>
          <button className="admin-btn danger" onClick={resetDB}>СБРОС</button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="admin-table">
            <thead><tr><th>Пост.</th><th>Название</th><th>Год</th><th>Жанр</th><th>Страна</th><th>Тип</th><th>Действия</th></tr></thead>
            <tbody>
              {visible.map(m=>(
                <tr key={m.id}>
                  <td>{m.poster&&(m.poster.startsWith('http')||m.poster.startsWith('//'))
                    ?<img className="poster-mini" src={m.poster} alt="" onError={e=>e.target.style.display='none'}/>
                    :<div className="poster-mini-ph">{m.title.slice(0,4)}</div>}</td>
                  <td style={{maxWidth:180,wordBreak:'break-word'}}>{m.title}</td>
                  <td>{m.year}</td><td>{m.genre}</td><td>{m.country}</td>
                  <td>{m.type==='movie'?'Фильм':'Сериал'}{m.seasons?` (${m.seasons}с)`:''}</td>
                  <td style={{whiteSpace:'nowrap'}}>
                    <button className="admin-btn" style={{padding:'4px 10px',fontSize:12}} onClick={()=>startEdit(m)}>✏️</button>
                    {' '}
                    <button className="admin-btn danger" style={{padding:'4px 10px',fontSize:12}} onClick={()=>remove(m.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
              {visible.length===0&&<tr><td colSpan={7} style={{textAlign:'center',color:'#555',padding:24}}>Ничего не найдено</td></tr>}
            </tbody>
          </table>
        </div>
      </>}

      {subtab==='add'&&<div className="admin-form">
        <h2>{editId?'РЕДАКТИРОВАТЬ':'ДОБАВИТЬ'}</h2>
        <div className="admin-row">
          <div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>НАЗВАНИЕ *</div>
            <input className="admin-input" placeholder="Название" value={form.title} onChange={e=>setF('title',e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>ГОД</div>
            <input className="admin-input" type="number" value={form.year} onChange={e=>setF('year',e.target.value)}/>
          </div>
        </div>
        <div className="admin-row">
          <div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>ЖАНР</div>
            <select className="admin-select" value={form.genre} onChange={e=>setF('genre',e.target.value)}>
              {GENRES_LIST.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>СТРАНА</div>
            <select className="admin-select" value={form.country} onChange={e=>setF('country',e.target.value)}>
              {COUNTRIES_LIST.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="admin-row">
          <div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>ТИП</div>
            <select className="admin-select" value={form.type} onChange={e=>setF('type',e.target.value)}>
              <option value="movie">Фильм</option>
              <option value="series">Сериал</option>
            </select>
          </div>
          {form.type==='series'&&<div>
            <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>СЕЗОНОВ</div>
            <input className="admin-input" type="number" min="1" value={form.seasons} onChange={e=>setF('seasons',e.target.value)}/>
          </div>}
        </div>
        <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>URL ПОСТЕРА (https://...)</div>
        <input className="admin-input" placeholder="https://example.com/poster.jpg"
          value={form.poster} onChange={e=>setF('poster',e.target.value)} style={{width:'100%',marginBottom:10}}/>
        {form.poster&&(form.poster.startsWith('http')||form.poster.startsWith('//'))&&(
          <div style={{marginBottom:10}}>
            <img src={form.poster} alt="" style={{height:100,width:'auto',display:'block',objectFit:'cover'}}
              onError={e=>e.target.style.display='none'}/>
          </div>
        )}
        <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>ОПИСАНИЕ</div>
        <textarea className="admin-textarea" placeholder="Краткое описание..."
          value={form.desc} onChange={e=>setF('desc',e.target.value)}/>
        <div>
          <button className="admin-btn" onClick={save} disabled={saving}>
            {saving?'СОХРАНЕНИЕ...':(editId?'СОХРАНИТЬ':'ДОБАВИТЬ')}
          </button>
          <button className="admin-btn secondary" onClick={cancelEdit}>ОТМЕНА</button>
        </div>
        {success&&<div className="admin-success">{success}</div>}
      </div>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────
const Header=({navClick,doSearch,searchInput,setSearchInput,tab,setTab,prevTab,user,setShowAuth})=>(
    <>
      <div className="header">
        <div className="logo" onClick={()=>navClick('home')}>КИНОМАНИЯ</div>
        <div className="header-right">
          <div className="search-wrap">
            <button className="search-icon" onClick={doSearch}>🔍</button>
            <input placeholder="Поиск..." value={searchInput}
              onChange={e=>setSearchInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
            {searchInput&&<button className="search-clear"
              onClick={()=>{setSearchInput('');if(tab==='search')setTab(prevTab)}}>×</button>}
          </div>
          <div className="avatar-btn" onClick={()=>user?navClick('profile'):setShowAuth(true)}>
            {user?<span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{user.name[0].toUpperCase()}</span>:'👤'}
          </div>
        </div>
      </div>
      <div className="nav">
        {[['home','ГЛАВНАЯ'],['movies','ФИЛЬМЫ'],['series','СЕРИАЛЫ'],['info','ИНФО']].map(([t,l])=>(
          <div key={t} className={`nav-item${tab===t?' active':''}`} onClick={()=>navClick(t)}>{l}</div>
        ))}
      </div>
    </>
  );

  
function App(){
  // Конфиг: из кода или из localStorage (если пользователь ввёл через форму)
  const[cfg,setCfg]=useState(()=>{
    if(CONFIGURED) return{key:JSONBIN_KEY,usersId:BIN_USERS_ID,dbId:BIN_DB_ID};
    return lsGet('km_cfg',null);
  });

  const[db,setDB]=useState(null);
  const[tab,setTab]=useState('home');
  const[prevTab,setPrevTab]=useState('home');
  const[showAuth,setShowAuth]=useState(false);
  const[user,setUser]=useState(()=>lsGet('km_cur',null));
  const[favs,setFavs]=useState([]);
  const[selectedMovie,setSelectedMovie]=useState(null);
  const[searchInput,setSearchInput]=useState('');
  const[searchQ,setSearchQ]=useState('');

  // Загрузка БД
  useEffect(()=>{
    async function init(){
      // Мгновенный кэш
      const cached=cfg?lsGet('bin_'+cfg.dbId,null):lsGet('km_db_local',null);
      if(cached)setDB(cached);
      // Затем облако
      if(cfg?.key&&cfg?.dbId){
        try{
          const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.dbId}/latest`,{
            headers:{'X-Master-Key':cfg.key}
          });
          if(r.ok){
            const d=await r.json();
            const dbData=d.record;
            // Инициализация пустого бина
            if(!dbData?.movies||dbData.movies.length===0){
              const fb=getFallbackDB();
              await fetch(`https://api.jsonbin.io/v3/b/${cfg.dbId}`,{
                method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':cfg.key},
                body:JSON.stringify(fb)
              });
              lsSet('bin_'+cfg.dbId,fb);setDB(fb);
            } else {
              lsSet('bin_'+cfg.dbId,dbData);setDB(dbData);
            }
          } else if(!cached) setDB(getFallbackDB());
        }catch{if(!cached)setDB(getFallbackDB());}
      } else if(!cached){
        // Пробуем db.json
        try{
          const r=await fetch('db.json');
          if(r.ok){const d=await r.json();lsSet('km_db_local',d);setDB(d);}
          else setDB(getFallbackDB());
        }catch{setDB(getFallbackDB());}
      }
    }
    init();
  },[cfg?.dbId]);

  useEffect(()=>{
    if(user)setFavs(lsGet('km_favs_'+user.email,[]));
    else setFavs([]);
  },[user?.email]);

  const toggleFav=useCallback((id)=>{
    if(!user)return;
    const next=favs.includes(id)?favs.filter(x=>x!==id):[...favs,id];
    setFavs(next);lsSet('km_favs_'+user.email,next);
  },[user,favs]);

  const goMovie=(m)=>{setPrevTab(tab);setSelectedMovie(m);setTab('detail')};
  const goBack=()=>{setSelectedMovie(null);setTab(prevTab)};
  const handleAuth=(u)=>{setUser(u);setShowAuth(false)};
  const handleLogout=()=>{lsSet('km_cur',null);setUser(null);setTab('home')};

  const doSearch=()=>{
    const q=searchInput.trim();if(!q)return;
    setSearchQ(q);setPrevTab(tab);setTab('search');
  };

  const navClick=(t)=>{
    if(t==='profile'){if(!user){setShowAuth(true);return;}setTab('profile');return;}
    setSelectedMovie(null);setTab(t);
  };

  const movies=db?.movies||[];

  const Footer=()=>(
    <div className="footer">
      <div className="footer-social">
        НАШИ СОЦСЕТИ:
        {[
  ['🎵','#111','https://youtu.be/-Q20EhmiSJ0'],
  ['💬','#5865F2',null],
  ['✈️','#0088cc',null],
  ['▶','#FF0000',null]
].map(([i,c,url],idx)=>(
  <div
    key={idx}
    className="social-icon"
    style={{
      background:c,
      border:'1px solid #333',
      cursor:url?'pointer':'default'
    }}
    onClick={()=>url&&window.open(url,'_blank')}
  >
    {i}
  </div>
))}
      </div>
      <div className="footer-copy">© Шавлюга Александр</div>
    </div>
  );

  if(!db)return(
    <div>
      <Header navClick={navClick} doSearch={doSearch} searchInput={searchInput} setSearchInput={setSearchInput} tab={tab} setTab={setTab} prevTab={prevTab} user={user} setShowAuth={setShowAuth}/>
      <div className="loading"><div className="spinner"></div>ЗАГРУЗКА</div>
      <Footer/>
    </div>
  );

  return(
    <div>
      <Header navClick={navClick} doSearch={doSearch} searchInput={searchInput} setSearchInput={setSearchInput} tab={tab} setTab={setTab} prevTab={prevTab} user={user} setShowAuth={setShowAuth}/>
      <>
        {tab==='home'&&<HomePage movies={movies} onMovie={goMovie}/>}
        {tab==='movies'&&<ListPage type="movie" movies={movies} onMovie={goMovie}/>}
        {tab==='series'&&<ListPage type="series" movies={movies} onMovie={goMovie}/>}
        {tab==='info'&&<InfoPage/>}
        {tab==='profile'&&user&&<ProfilePage user={user} movies={movies} onLogout={handleLogout} favs={favs} onMovie={goMovie} onAdmin={()=>setTab('admin')}/>}
        {tab==='admin'&&<AdminPanel db={db} onDBChange={setDB} onBack={()=>setTab('profile')} binKey={cfg?.key} binDbId={cfg?.dbId}/>}
        {tab==='search'&&<SearchResults query={searchQ} movies={movies} onMovie={goMovie}/>}
        {tab==='detail'&&selectedMovie&&<MovieDetail movie={selectedMovie} user={user}
          onBack={goBack} favs={favs} toggleFav={toggleFav} onAuthNeeded={()=>setShowAuth(true)}/>}
      </>
      <Footer/>
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onAuth={handleAuth} binKey={cfg?.key} binUsersId={cfg?.usersId}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
